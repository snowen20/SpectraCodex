<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0a0a0a"/>

  <!-- Map background tile -->
  <rect x="70" y="68" width="260" height="164" rx="8" fill="#0e0e1a" stroke="#222233" stroke-width="1.5"/>

  <!-- Map road lines -->
  <line x1="70" y1="142" x2="330" y2="142" stroke="#1e1e3a" stroke-width="8"/>
  <line x1="200" y1="68" x2="200" y2="232" stroke="#1e1e3a" stroke-width="8"/>
  <line x1="70" y1="180" x2="180" y2="180" stroke="#1a1a30" stroke-width="5"/>
  <line x1="240" y1="100" x2="330" y2="100" stroke="#1a1a30" stroke-width="5"/>
  <line x1="130" y1="68" x2="130" y2="142" stroke="#1a1a30" stroke-width="5"/>
  <line x1="270" y1="142" x2="270" y2="232" stroke="#1a1a30" stroke-width="5"/>

  <!-- City blocks -->
  <rect x="84" y="82" width="38" height="52" rx="3" fill="#141420"/>
  <rect x="148" y="82" width="44" height="52" rx="3" fill="#141420"/>
  <rect x="84" y="152" width="88" height="72" rx="3" fill="#141420"/>
  <rect x="208" y="82" width="44" height="52" rx="3" fill="#141420"/>
  <rect x="280" y="82" width="36" height="52" rx="3" fill="#141420"/>
  <rect x="208" y="152" width="44" height="32" rx="3" fill="#141420"/>
  <rect x="280" y="152" width="36" height="72" rx="3" fill="#141420"/>

  <!-- Secondary pins (small) -->
  <circle cx="160" cy="108" r="5" fill="#5b21b6" opacity="0.7"/>
  <circle cx="285" cy="92" r="5" fill="#5b21b6" opacity="0.7"/>
  <circle cx="225" cy="165" r="5" fill="#5b21b6" opacity="0.7"/>

  <!-- Main map pin -->
  <path d="M200 82 C188 82 178 92 178 104 C178 120 200 142 200 142 C200 142 222 120 222 104 C222 92 212 82 200 82 Z" fill="#7c3aed"/>
  <circle cx="200" cy="104" r="9" fill="#0a0a0a"/>
  <circle cx="200" cy="104" r="5" fill="#9d5cf0"/>

  <!-- Pin shadow -->
  <ellipse cx="200" cy="143" rx="8" ry="3" fill="#7c3aed" opacity="0.3"/>

  <!-- Compass rose (bottom right corner) -->
  <g transform="translate(302, 206)">
    <circle cx="0" cy="0" r="16" fill="#0e0e1a" stroke="#222233" stroke-width="1"/>
    <polygon points="0,-12 3,-4 0,-6 -3,-4" fill="#7c3aed"/>
    <polygon points="0,12 3,4 0,6 -3,4" fill="#444455"/>
    <polygon points="-12,0 -4,-3 -6,0 -4,3" fill="#444455"/>
    <polygon points="12,0 4,-3 6,0 4,3" fill="#444455"/>
    <text x="0" y="-14" font-family="system-ui,sans-serif" font-size="6" font-weight="700" fill="#7c3aed" text-anchor="middle">N</text>
  </g>

  <!-- Label -->
  <text x="200" y="258" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#7c3aed" text-anchor="middle" letter-spacing="2">LOCALE LENS</text>
</svg>
