<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0a0a0a"/>

  <!-- Chart baseline -->
  <line x1="90" y1="215" x2="310" y2="215" stroke="#333355" stroke-width="1.5"/>
  <!-- Y-axis grid lines -->
  <line x1="90" y1="175" x2="310" y2="175" stroke="#222233" stroke-width="1" opacity="0.5"/>
  <line x1="90" y1="135" x2="310" y2="135" stroke="#222233" stroke-width="1" opacity="0.5"/>
  <line x1="90" y1="95" x2="310" y2="95" stroke="#222233" stroke-width="1" opacity="0.5"/>

  <!-- Bar 1 -->
  <rect x="105" y="165" width="32" height="50" rx="4" fill="#5b21b6" opacity="0.8"/>
  <!-- Bar 2 -->
  <rect x="153" y="140" width="32" height="75" rx="4" fill="#7c3aed" opacity="0.9"/>
  <!-- Bar 3 (tallest / accent) -->
  <rect x="201" y="105" width="32" height="110" rx="4" fill="#7c3aed"/>
  <!-- Glow on tallest bar -->
  <rect x="201" y="105" width="32" height="110" rx="4" fill="url(#barGlow)" opacity="0.3"/>
  <!-- Bar 4 -->
  <rect x="249" y="150" width="32" height="65" rx="4" fill="#5b21b6" opacity="0.8"/>

  <defs>
    <linearGradient id="barGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9d5cf0"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Dollar sign -->
  <text x="217" y="97" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle" opacity="0.9">$</text>

  <!-- Trend line -->
  <polyline points="121,161 169,136 217,101 265,146" fill="none" stroke="#9d5cf0" stroke-width="2" stroke-dasharray="4 3" opacity="0.6"/>
  <!-- Trend dots -->
  <circle cx="121" cy="161" r="3" fill="#9d5cf0"/>
  <circle cx="169" cy="136" r="3" fill="#9d5cf0"/>
  <circle cx="217" cy="101" r="3" fill="#9d5cf0"/>
  <circle cx="265" cy="146" r="3" fill="#9d5cf0"/>

  <!-- Label -->
  <text x="200" y="258" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#7c3aed" text-anchor="middle" letter-spacing="2">BUDGET BLIP</text>
</svg>
